<article class="card" (click)="openDetail.emit(movie())">
  <div class="card__poster-wrap">
    <img
      class="card__poster"
      [src]="posterUrl(movie().poster_path)"
      [alt]="title"
      loading="lazy"
    />
    <div class="card__overlay">
      <button class="card__play" type="button" aria-label="Ver detalhes">▶</button>
    </div>
    <span class="card__badge card__badge--{{ ratingClass }}">⭐ {{ rating }}</span>

    <!-- Watchlist toggle -->
    <button
      class="card__watchlist"
      [class.card__watchlist--active]="watchlistService.isInWatchlist(movie().id)"
      (click)="toggleWatchlist($event)"
      type="button"
      [attr.aria-label]="watchlistService.isInWatchlist(movie().id) ? 'Remover da watchlist' : 'Salvar na watchlist'"
    >
      {{ watchlistService.isInWatchlist(movie().id) ? '♥' : '♡' }}
    </button>
  </div>
  <div class="card__body">
    <h3 class="card__title">{{ title }}</h3>
    <span class="card__year">{{ year }}</span>
  </div>
</article>
